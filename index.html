<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Новая вкладка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    html, body {

    #viewer {
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: none;
    }

<body>
  <iframe id="viewer" src="document.pdf" title="PDF"></iframe>
</body>
</html>
